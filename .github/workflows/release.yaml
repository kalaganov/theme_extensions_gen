name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: npm install
        working-directory: tools/release

      - name: Extract last tag and bump version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0)
          echo "LAST_TAG=$LAST_TAG"
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          VERSION=$(node -p "const v=require('./tools/release/package.json').version.split('.').map(Number); v[2]++; v.join('.')")          
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          npx conventional-changelog \
            --config ./tools/release/custom-preset.js \
            -i packages/theme_extensions_gen/CHANGELOG.md \
            -s \
            --commit-path . \
            --from "${{ steps.version.outputs.last_tag }}"

      - name: Bump pubspec.yaml
        run: dart tools/release/bump_pubspec_version.dart ${{ steps.version.outputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add packages/theme_extensions_gen/pubspec.yaml \
                  packages/theme_extensions_gen/CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Push to repo
        run: |
          git push origin main --follow-tags