name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dart-lang/setup-dart@v1

      - name: Install standard-version deps
        run: |
          cd tools/release
          npm install

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Bump version manually
        run: |
          cd tools/release
          node -e "const fs=require('fs');
            const f='package.json';
            const j=JSON.parse(fs.readFileSync(f));
            const v=j.version.split('.').map(Number);
            v[2]++; j.version=v.join('.');
            fs.writeFileSync(f, JSON.stringify(j, null, 2));"

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./tools/release/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Fetch all tags
        run: git fetch --tags

      - name: Debug
        run: |
          git log --oneline --decorate --graph --all

      - name: Generate changelog with custom template
        run: |
          cd tools/release
          LAST_TAG=$(git describe --tags --abbrev=0 --exclude v${{ env.VERSION }})
          echo "Using tag range: